# =============================================
# application.properties - Hito 2
# Usa H2 en memoria para desarrollo/pruebas
# Cambia al bloque PostgreSQL para producción
# =============================================

spring.application.name=triage-academico

# --- Base de datos H2 (desarrollo) ---
spring.datasource.url=jdbc:h2:mem:triagedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Paginación ---
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# --- Logging ---
logging.level.com.universidad.triage=DEBUG
logging.level.org.springframework.security=DEBUG

